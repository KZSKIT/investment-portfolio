<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY PORTFOLIO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --header-bg: #0f172a;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border-color: #cbd5e1;

            /* 国内標準の騰落色 */
            --trend-plus: #ef4444;  /* 上昇：赤 */
            --trend-minus: #10b981; /* 下落：緑 */
            --trend-flat: #94a3b8;  /* 変化なし：グレー */

            /* 5大カテゴリの一貫した固定色 */
            --color-jp-stock: #3b82f6; /* 国内株：ブルー */
            --color-us-stock: #1d4ed8; /* 米国株：ディープブルー */
            --color-fund:     #10b981; /* 投資信託：グリーン */
            --color-gold:     #f59e0b; /* 金：ゴールド */
            --color-crypto:   #8b5cf6; /* 暗号資産：パープル */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            font-size: 14px;
        }

        header {
            background-color: var(--header-bg);
            color: #ffffff;
            padding: 16px 20px;
        }
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0.05em; }
        
        .market-board { display: flex; gap: 16px; }
        .market-item { font-size: 12px; color: #94a3b8; }
        .market-item strong { color: #ffffff; margin-left: 4px; }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .grid-two {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media(min-width: 768px) {
            .grid-two { grid-template-columns: 1fr 360px; }
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        .card h2 { margin: 0 0 16px 0; font-size: 15px; font-weight: 600; color: var(--text-main); }

        .controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px; flex-wrap: wrap; }
        .btn-group { display: flex; gap: 4px; background: #e2e8f0; padding: 3px; border-radius: 6px; }
        .btn-toggle { background: transparent; border: none; padding: 4px 12px; font-size: 12px; font-weight: 600; border-radius: 4px; cursor: pointer; color: var(--text-sub); }
        .btn-toggle.active { background: white; color: var(--text-main); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        /* テーブル */
        .summary-table, .detail-table { width: 100%; border-collapse: collapse; }
        .summary-table th, .summary-table td, .detail-table th, .detail-table td { padding: 10px; border-bottom: 1px solid var(--border-color); text-align: right; }
        .summary-table th, .detail-table th { color: var(--text-sub); font-weight: 500; font-size: 12px; text-align: right; background: #f1f5f9; }
        .summary-table th:first-child, .summary-table td:first-child, .detail-table th:first-child, .detail-table td:first-child { text-align: left; }

        .category-label { display: flex; align-items: center; gap: 8px; font-weight: 600; cursor: pointer; }
        .color-dot { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }

        /* ドーナツグラフ */
        .chart-box { position: relative; margin: 0 auto; height: 220px; width: 220px; }
        .chart-center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; width: 80%; }
        .chart-center-text .label { font-size: 11px; color: var(--text-sub); }
        .chart-center-text .val { font-size: 18px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .trend-box { height: 280px; width: 100%; }

        /* ランキング */
        .ranking-container { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 20px; }
        @media(min-width: 768px) { .ranking-container { grid-template-columns: 1fr 1fr; } }
        .ranking-box { background: #f8fafc; border-radius: 6px; padding: 12px; border: 1px solid var(--border-color); }
        .ranking-title { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 8px; }
        .ranking-item { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }

        /* アクションボタン */
        .sort-chips { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        @media(min-width: 768px) { .sort-chips { display: none; } }
        .chip { background: #e2e8f0; padding: 4px 12px; border-radius: 100px; font-size: 12px; cursor: pointer; }
        .chip.active { background: var(--header-bg); color: white; }
        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { background: #e2e8f0; }

        .btn { background-color: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn:hover { background-color: #2563eb; }
        .btn-secondary { background-color: #64748b; padding: 6px 12px; font-size: 12px; border-radius: 4px; border: none; color: white; cursor: pointer; }
        .btn-delete { background: none; border: none; color: var(--text-sub); cursor: pointer; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-left: 6px; }
        .btn-delete:hover { background: #ef4444; color: white; }

        .dev-panel { margin-top: 30px; padding: 15px; background: #f1f5f9; border-radius: 6px; }
        .dev-panel input, .dev-panel select { padding: 6px; margin-right: 5px; border: 1px solid var(--border-color); border-radius: 4px; font-family: inherit; }
        textarea.backup-io { width: 100%; height: 160px; font-family: monospace; font-size: 11px; margin-top: 8px; background: #ffffff; line-height: 1.4; }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <h1>MY PORTFOLIO</h1>
        <div class="market-board">
            <div class="market-item">USD/JPY <strong id="mkt-usdjpy">取得中...</strong></div>
            <div class="market-item">GOLD (円/g) <strong id="mkt-gold">取得中...</strong></div>
        </div>
    </div>
</header>

<div class="container">
    <div class="card">
        <div class="controls-row">
            <h2 id="trend-title">資産推移</h2>
            <div style="display:flex; gap:10px;">
                <div class="btn-group">
                    <button class="btn-toggle active" id="range-all" onclick="setTrendRange('all')">全期間</button>
                    <button class="btn-toggle" id="range-1y" onclick="setTrendRange('1y')">1年</button>
                    <button class="btn-toggle" id="range-3y" onclick="setTrendRange('3y')">3年</button>
                </div>
                <div class="btn-group">
                    <button class="btn-toggle active" id="unit-monthly" onclick="setTrendUnit('monthly')">月次</button>
                    <button class="btn-toggle" id="unit-yearly" onclick="setTrendUnit('yearly')">年次</button>
                </div>
            </div>
        </div>
        <div class="trend-box">
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <div class="grid-two">
        <div class="card">
            <h2>資産構成・区分別サマリー</h2>
            <table class="summary-table">
                <thead>
                    <tr>
                        <th style="text-align:left;">区分 (クリックで内訳)</th>
                        <th>評価額</th>
                        <th>構成比</th>
                        <th>評価損益</th>
                    </tr>
                </thead>
                <tbody id="summary-body"></tbody>
            </table>

            <h2 id="detail-title" style="margin-top: 30px;">銘柄明細 (全表示)</h2>
            <div class="sort-chips">
                <div class="chip" id="chip-name" onclick="setSort('name')">銘柄名</div>
                <div class="chip active" id="chip-eval" onclick="setSort('eval')">評価額</div>
                <div class="chip" id="chip-profit" onclick="setSort('profit')">評価損益</div>
            </div>
            <table class="detail-table">
                <thead>
                    <tr>
                        <th style="text-align:left;" class="sortable" onclick="handleSort('name')">銘柄 / 証券会社</th>
                        <th class="sortable" onclick="handleSort('price')">現在値</th>
                        <th>前日比 / 前月比</th>
                        <th class="sortable" onclick="handleSort('eval')">評価額 / 数量</th>
                        <th class="sortable" onclick="handleSort('profit')">評価損益</th>
                    </tr>
                </thead>
                <tbody id="detail-body"></tbody>
            </table>
        </div>

        <div class="grid-one">
            <div class="card">
                <h2 id="chart-title">アセットアロケーション</h2>
                <div class="chart-box">
                    <canvas id="allocationChart"></canvas>
                    <div class="chart-center-text">
                        <div class="label" id="chart-center-label">評価額合計</div>
                        <div class="val" id="chart-center-val">¥0</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>損益率ランキング</h2>
                <div class="ranking-container">
                    <div class="ranking-box">
                        <div class="ranking-title" style="color:var(--trend-plus);">🔥 上位ベスト3</div>
                        <div id="ranking-best"></div>
                    </div>
                    <div class="ranking-box">
                        <div class="ranking-title" style="color:var(--trend-minus);">❄️ 下位ワースト3</div>
                        <div id="ranking-worst"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card dev-panel">
        <h2>データ管理（実データ登録 ＆ 日次スナップショット履歴登録）</h2>
        <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:10px;">
            <select id="form-cat">
                <option value="jp-stock">国内株</option>
                <option value="us-stock">米国株</option>
                <option value="fund">投資信託</option>
                <option value="gold">金</option>
                <option value="crypto">暗号資産</option>
            </select>
            <input type="text" id="form-symbol" placeholder="Yahooコード (例: 2157.T)">
            <button type="button" class="btn-secondary" id="btn-ticker-check" onclick="fetchTickerInfo()">コード確認</button>
            <input type="text" id="form-name" placeholder="銘柄名" style="width:250px;">
            <input type="text" id="form-broker" placeholder="証券会社" list="broker-list">
            <datalist id="broker-list"></datalist>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
            <input type="number" id="form-qty" placeholder="数量" step="any" style="width:100px;">
            <input type="number" id="form-cost" placeholder="取得単価" style="width:100px;">
            <input type="number" id="form-price" placeholder="現在値" style="width:100px;">
            <input type="date" id="form-purchase-date">
            <button class="btn" onclick="addRealData()">銘柄を追加</button>
            
            <div style="border-left:1px solid var(--border-color); padding-left:10px; display:flex; gap:5px; align-items:center;">
                <input type="date" id="history-date">
                <button class="btn btn-secondary" style="background:var(--header-bg);" onclick="saveSnapshot()">この日付で推移に記録</button>
            </div>
        </div>
        
        <div style="margin-top: 15px; padding-top: 10px; border-top: 1px dashed var(--border-color);">
            <label style="font-weight: 600; font-size: 12px; color: var(--text-main);">【GitHub同期用マスターデータ】変更後は枠内を全コピーして holdings.json に上書き保存してください</label>
            <textarea id="backupText" class="backup-io" readonly onclick="this.select()"></textarea>
            <div style="margin-top:5px; display:flex; gap:5px;">
                <button class="btn btn-secondary" style="background:#ef4444;" onclick="clearToAbsoluteZero()">データを完全に空にする（実運用開始）</button>
                <button class="btn btn-secondary" style="background:#475569;" onclick="restoreDemoDataset()">確認用デモデータを復元</button>
            </div>
        </div>
    </div>
</div>

<script>
    const catConfig = {
        'jp-stock': { name: '国内株', color: '#3b82f6' },
        '
