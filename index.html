<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY PORTFOLIO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --header-bg: #0f172a;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border-color: #cbd5e1;

            /* 国内標準の騰落色 */
            --trend-plus: #ef4444;  /* 上昇：赤 */
            --trend-minus: #10b981; /* 下落：緑 */
            --trend-flat: #94a3b8;  /* 変化なし：グレー */

            /* 5大カテゴリの一貫した固定色（意味のない色は足さない） */
            --color-jp-stock: #3b82f6; /* 国内株：ブルー */
            --color-us-stock: #1d4ed8; /* 米国株：ディープブルー */
            --color-fund:     #10b981; /* 投資信託：グリーン */
            --color-gold:     #f59e0b; /* 金：ゴールド */
            --color-crypto:   #8b5cf6; /* 暗号資産：パープル */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            font-size: 14px;
        }

        header {
            background-color: var(--header-bg);
            color: #ffffff;
            padding: 16px 20px;
        }
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0.05em; }
        
        .market-board { display: flex; gap: 16px; }
        .market-item { font-size: 12px; color: #94a3b8; }
        .market-item strong { color: #ffffff; margin-left: 4px; }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .grid-two {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media(min-width: 768px) {
            .grid-two { grid-template-columns: 1fr 360px; }
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        .card h2 {
            margin: 0 0 16px 0;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* 区分別サマリーテーブル */
        .summary-table, .detail-table {
            width: 100%;
            border-collapse: collapse;
        }
        .summary-table th, .summary-table td, .detail-table th, .detail-table td {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            text-align: right;
        }
        .summary-table th, .detail-table th {
            color: var(--text-sub);
            font-weight: 500;
            font-size: 12px;
            text-align: right;
            background: #f1f5f9;
        }
        .summary-table th:first-child, .summary-table td:first-child,
        .detail-table th:first-child, .detail-table td:first-child {
            text-align: left;
        }

        /* カテゴリのカラーインジケータ */
        .category-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            display: inline-block;
        }

        /* ドーナツ中央テキスト */
        .chart-box { position: relative; margin: 0 auto; height: 220px; width: 220px; }
        .chart-center-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; pointer-events: none;
            width: 80%;
        }
        .chart-center-text .label { font-size: 11px; color: var(--text-sub); }
        .chart-center-text .val { font-size: 18px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ランキング */
        .ranking-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        @media(min-width: 768px) {
            .ranking-container { grid-template-columns: 1fr 1fr; }
        }
        .ranking-box {
            background: #f8fafc;
            border-radius: 6px;
            padding: 12px;
            border: 1px solid var(--border-color);
        }
        .ranking-title { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 8px; }
        .ranking-item { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }

        /* モバイル用ソートチップ */
        .sort-chips { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        @media(min-width: 768px) { .sort-chips { display: none; } }
        .chip {
            background: #e2e8f0; padding: 4px 12px; border-radius: 100px; font-size: 12px; cursor: pointer;
        }
        .chip.active { background: var(--header-bg); color: white; }

        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { background: #e2e8f0; }

        /* 入力用簡易フォーム */
        .dev-panel { margin-top: 30px; padding: 15px; background: #f1f5f9; border-radius: 6px; }
        .dev-panel input, .dev-panel select { padding: 6px; margin-right: 5px; border: 1px solid var(--border-color); border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <h1>MY PORTFOLIO</h1>
        <div class="market-board">
            <div class="market-item">USD/JPY <strong id="mkt-usdjpy">取得中...</strong></div>
            <div class="market-item">GOLD (円/g) <strong id="mkt-gold">取得中...</strong></div>
        </div>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2>資産推移</h2>
        <div style="height: 160px; display:flex; align-items:center; justify-content:center; color:var(--text-sub); background:#f8fafc; border:1px dashed var(--border-color);">
            ※ステップ3にて、日次スナップショットを用いた積み上げ棒グラフを統合します
        </div>
    </div>

    <div class="grid-two">
        <div class="card">
            <h2>資産構成・区分別サマリー</h2>
            <table class="summary-table">
                <thead>
                    <tr>
                        <th style="text-align:left;">区分 (クリックで内訳)</th>
                        <th>評価額</th>
                        <th>構成比</th>
                        <th>評価損益</th>
                    </tr>
                </thead>
                <tbody id="summary-body">
                    </tbody>
            </table>

            <h2 id="detail-title" style="margin-top: 30px;">銘柄明細 (全表示)</h2>
            <div class="sort-chips" id="sort-chips">
                <div class="chip" id="chip-name" onclick="setSort('name')">銘柄名</div>
                <div class="chip active" id="chip-eval" onclick="setSort('eval')">評価額</div>
                <div class="chip" id="chip-profit" onclick="setSort('profit')">評価損益</div>
            </div>
            <table class="detail-table">
                <thead>
                    <tr>
                        <th style="text-align:left;" class="sortable" onclick="handleSort('name')">銘柄 / 証券会社</th>
                        <th class="sortable" onclick="handleSort('price')">現在値</th>
                        <th>前日比 / 前月比</th>
                        <th class="sortable" onclick="handleSort('eval')">評価額 / 数量</th>
                        <th class="sortable" onclick="handleSort('profit')">評価損益</th>
                    </tr>
                </thead>
                <tbody id="detail-body">
                    </tbody>
            </table>
        </div>

        <div class="grid-one">
            <div class="card">
                <h2 id="chart-title">アセットアロケーション</h2>
                <div class="chart-box">
                    <canvas id="allocationChart"></canvas>
                    <div class="chart-center-text">
                        <div class="label" id="chart-center-label">評価額合計</div>
                        <div class="val" id="chart-center-val">¥0</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>損益率ランキング</h2>
                <div class="ranking-container">
                    <div class="ranking-box">
                        <div class="ranking-title" style="color:var(--trend-plus);">🔥 上位ベスト3</div>
                        <div id="ranking-best"></div>
                    </div>
                    <div class="ranking-box">
                        <div class="ranking-title" style="color:var(--trend-minus);">❄️ 下位ワースト3</div>
                        <div id="ranking-worst"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card dev-panel">
        <h2>【ステップ1確認用】テストデータ登録フォーム</h2>
        <div style="display:flex; flex-wrap:wrap; gap:10px;">
            <select id="form-cat">
                <option value="jp-stock">国内株</option>
                <option value="us-stock">米国株</option>
                <option value="fund">投資信託</option>
                <option value="gold">金</option>
                <option value="crypto">暗号資産</option>
            </select>
            <input type="text" id="form-name" placeholder="銘柄名（例: トヨタ）">
            <input type="text" id="form-broker" placeholder="証券会社（例: SBI証券）">
            <input type="number" id="form-qty" placeholder="保有数量">
            <input type="number" id="form-cost" placeholder="取得単価">
            <input type="number" id="form-price" placeholder="現在値">
            <button class="btn" onclick="addTestData()">銘柄を追加</button>
            <button class="btn btn-secondary" onclick="clearTestData()" style="background:#ef4444;">データ全消去</button>
        </div>
    </div>
</div>

<script>
    const catConfig = {
        'jp-stock': { name: '国内株', color: '#3b82f6' },
        'us-stock': { name: '米国株', color: '#1d4ed8' },
        'fund':     { name: '投資信託', color: '#10b981' },
        'gold':     { name: '金', color: '#f59e0b' },
        'crypto':   { name: '暗号資産', color: '#8b5cf6' }
    };

    let holdings = [];
    let currentFilter = null; 
    let currentSort = { key: 'eval', asc: false };
    let allocChart = null;

    window.onload = function() {
        loadHoldings();
        fetchLiveRates();
        renderDashboard();
    };

    async function fetchLiveRates() {
        try {
            const resUsd = await fetch('https://open.er-api.com/v6/latest/USD');
            if (resUsd.ok) {
                const data = await resUsd.json();
                document.getElementById('mkt-usdjpy').innerText = '¥' + data.rates.JPY.toFixed(2);
            }
            const resGold = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=pax-gold&vs_currencies=jpy');
            if (resGold.ok) {
                const data = await resGold.json();
                const gramPrice = data['pax-gold'].jpy / 31.1035;
                document.getElementById('mkt-gold').innerText = '¥' + Math.round(gramPrice).toLocaleString();
            }
        } catch(e) { console.error("ライブレート取得エラー", e); }
    }

    function loadHoldings() {
        const saved = localStorage.getItem('my_portfolio_holdings');
        if (saved) {
            holdings = JSON.parse(saved);
        } else {
            holdings = [
                { id: 1, cat: 'jp-stock', name: 'トヨタ自動車 (7203)', broker: 'SBI証券', qty: 100, cost: 2500, price: 2800 },
                { id: 2, cat: 'jp-stock', name: '三菱UFJ (8306)', broker: 'SBI証券', qty: 200, cost: 1200, price: 1550 },
                { id: 3, cat: 'us-stock', name: 'Apple (AAPL)', broker: '楽天証券', qty: 10, cost: 180, price: 210 }, 
                { id: 4, cat: 'fund', name: 'eMAXIS Slim 全世界株式', broker: 'SBI証券', qty: 50000, cost: 2.0, price: 2.4 },
                { id: 5, cat: 'gold', name: '純金積立', broker: '田中貴金属', qty: 50, cost: 9000, price: 12000 },
                { id: 6, cat: 'crypto', name: 'Bitcoin (BTC)', broker: 'bitFlyer', qty: 0.05, cost: 6000000, price: 9500000 }
            ];
            localStorage.setItem('my_portfolio_holdings', JSON.stringify(holdings));
        }
    }

    function addTestData() {
        const name = document.getElementById('form-name').value;
        if(!name) return alert('銘柄名を入力してください');
        const newItem = {
            id: Date.now(),
            cat: document.getElementById('form-cat').value,
            name: name,
            broker: document.getElementById('form-broker').value || '不明',
            qty: parseFloat(document.getElementById('form-qty').value) || 0,
            cost: parseFloat(document.getElementById('form-cost').value) || 0,
            price: parseFloat(document.getElementById('form-price').value) || 0
        };
        holdings.push(newItem);
        localStorage.setItem('my_portfolio_holdings', JSON.stringify(holdings));
        renderDashboard();
    }

    function clearTestData() {
        if(confirm('全てのデータをクリアしますか？')) {
            holdings = [];
            localStorage.setItem('my_portfolio_holdings', JSON.stringify(holdings));
            renderDashboard();
        }
    }

    function handleSort(key) {
        if (currentSort.key === key) {
            currentSort.asc = !currentSort.asc;
        } else {
            currentSort.key = key;
            currentSort.asc = false;
        }
        renderDashboard();
    }

    function setSort(key) {
        currentSort.key = key;
        currentSort.asc = false;
        const chips = document.querySelectorAll('.chip');
        chips.forEach(c => c.classList.remove('active'));
        document.getElementById(`chip-${key}`).classList.add('active');
        renderDashboard();
    }

    function toggleFilter(cat) {
        currentFilter = (currentFilter === cat) ? null : cat;
        renderDashboard();
    }

    // 【新設】固定カテゴリ色をベースに、ノイズのない階調（透明度）のカラーを生成する関数
    function getGradatedColor(cat, index, total) {
        const baseColor = catConfig[cat].color;
        if (total <= 1) return baseColor;
        
        // 1.0〜0.3の間でアルファ値を等間隔に落とす（余計な色を足さない）
        const minAlpha = 0.35;
        const alpha = 1.0 - ((1.0 - minAlpha) * (index / (total - 1 || 1)));
        
        const c = baseColor.replace('#', '');
        const r = parseInt(c.substring(0, 2), 16);
        const g = parseInt(c.substring(2, 4), 16);
        const b = parseInt(c.substring(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function renderDashboard() {
        let totalVal = 0;
        const catTotals = { 'jp-stock': { val: 0, cost: 0 }, 'us-stock': { val: 0, cost: 0 }, 'fund': { val: 0, cost: 0 }, 'gold': { val: 0, cost: 0 }, 'crypto': { val: 0, cost: 0 } };

        // 評価額算出
        holdings.forEach(h => {
            const isUs = h.cat === 'us-stock';
            const rate = isUs ? 160 : 1; 
            const evalVal = h.qty * h.price * rate;
            const costVal = h.qty * h.cost * rate;

            catTotals[h.cat].val += evalVal;
            catTotals[h.cat].cost += costVal;
            totalVal += evalVal;
        });

        // 1. 区分別サマリーテーブルの描画
        const summaryBody = document.getElementById('summary-body');
        summaryBody.innerHTML = '';
        
        Object.keys(catConfig).forEach(cat => {
            const data = catTotals[cat];
            const pct = totalVal > 0 ? ((data.val / totalVal) * 100).toFixed(1) : '0.0';
            const profit = data.val - data.cost;
            const profitPct = data.cost > 0 ? ((profit / data.cost) * 100).toFixed(1) : '0.0';

            let trendColor = 'var(--trend-flat)';
            if (profit > 0) trendColor = 'var(--trend-plus)';
            if (profit < 0) trendColor = 'var(--trend-minus)';

            const isSelected = currentFilter === cat ? 'background:#f1f5f9; border-left:4px solid ' + catConfig[cat].color : '';

            summaryBody.innerHTML += `
                <tr style="cursor:pointer; ${isSelected}" onclick="toggleFilter('${cat}')">
                    <td class="category" style="text-align:left;">
                        <span class="category-label">
                            <span class="color-dot" style="background-color:${catConfig[cat].color}"></span>
                            ${catConfig[cat].name}
                        </span>
                    </td>
                    <td>¥${Math.round(data.val).toLocaleString()}</td>
                    <td>${pct}%</td>
                    <td style="color:${trendColor}; font-weight:600;">
                        ${profit >= 0 ? '+' : ''}${Math.round(profit).toLocaleString()}<br>
                        <span style="font-size:11px;">(${profit >= 0 ? '+' : ''}${profitPct}%)</span>
                    </td>
                </tr>
            `;
        });

        // 2. 明細用データの生成・フィルタ・ソート
        let processedHoldings = holdings.map(h => {
            const isUs = h.cat === 'us-stock';
            const rate = isUs ? 160 : 1;
            const evalVal = h.qty * h.price * rate;
            const costVal = h.qty * h.cost * rate;
            const profit = evalVal - costVal;
            const profitPct = costVal > 0 ? (profit / costVal) * 100 : 0;
            return { ...h, evalVal, profit, profitPct };
        });

        // ソート処理（グラフ順序を一貫させるためフィルタ前に適用）
        processedHoldings.sort((a, b) => {
            let valA = a[currentSort.key]; let valB = b[currentSort.key];
            if (currentSort.key === 'eval') { valA = a.evalVal; valB = b.evalVal; }
            if (currentSort.key === 'profit') { valA = a.profitPct; valB = b.profitPct; }
            if (typeof valA === 'string') return currentSort.asc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            return currentSort.asc ? valA - valB : valB - valA;
        });

        // フィルタ処理
        let displayedHoldings = [...processedHoldings];
        if (currentFilter) {
            displayedHoldings = processedHoldings.filter(h => h.cat === currentFilter);
            document.getElementById('detail-title').innerText = `銘柄明細 (${catConfig[currentFilter].name} 内訳)`;
            document.getElementById('chart-title').innerText = `アセットアロケーション (${catConfig[currentFilter].name})`;
            document.getElementById('chart-center-label').innerText = `${catConfig[currentFilter].name} 合計`;
            document.getElementById('chart-center-val').innerText = '¥' + Math.round(catTotals[currentFilter].val).toLocaleString();
        } else {
            document.getElementById('detail-title').innerText = "銘柄明細 (全表示)";
            document.getElementById('chart-title').innerText = "アセットアロケーション";
            document.getElementById('chart-center-label').innerText = "評価額合計";
            document.getElementById('chart-center-val').innerText = '¥' + Math.round(totalVal).toLocaleString();
        }

        // 3. 【修正版】グラフデータの組み立て（ドリルダウン完全連動）
        const chartLabels = [];
        const chartData = [];
        const chartColors = [];

        if (currentFilter) {
            // ドリルダウン時：選択されたカテゴリ内の「銘柄別」内訳
            displayedHoldings.forEach((h, idx) => {
                chartLabels.push(h.name);
                chartData.push(h.evalVal);
                // 飾り色は足さず、カテゴリ色の階調変化だけで表現
                chartColors.push(getGradatedColor(h.cat, idx, displayedHoldings.length));
            });
        } else {
            // 全体表示時：いつもの「カテゴリ別」比率
            Object.keys(catConfig).forEach(cat => {
                const data = catTotals[cat];
                chartLabels.push(catConfig[cat].name);
                chartData.push(data.val);
                chartColors.push(catConfig[cat].color);
            });
        }
        renderDonut(chartLabels, chartData, chartColors);

        // 4. 明細テーブルの描画
        const detailBody = document.getElementById('detail-body');
        detailBody.innerHTML = '';
        
        displayedHoldings.forEach(h => {
            let trendColor = 'inherit';
            if (h.profit > 0) trendColor = 'var(--trend-plus)';
            if (h.profit < 0) trendColor = 'var(--trend-minus)';

            detailBody.innerHTML += `
                <tr>
                    <td style="text-align:left; border-left: 3px solid ${catConfig[h.cat].color}; padding-left:8px;">
                        <strong>${h.name}</strong><br>
                        <span style="font-size:11px; color:var(--text-sub);">${h.broker}</span>
                    </td>
                    <td>
                        ¥${h.price.toLocaleString()}<br>
                        <span style="font-size:11px; color:var(--text-sub);">単価: ¥${h.cost.toLocaleString()}</span>
                    </td>
                    <td style="color:var(--trend-flat); font-size:12px;">
                        <span>前日: --</span><br>
                        <span>前月: --</span>
                    </td>
                    <td>
                        ¥${Math.round(h.evalVal).toLocaleString()}<br>
                        <span style="font-size:11px; color:var(--text-sub);">${h.qty.toLocaleString()}株/口</span>
                    </td>
                    <td style="color:${trendColor}; font-weight:600;">
                        ${h.profit >= 0 ? '+' : ''}${Math.round(h.profit).toLocaleString()}<br>
                        <span style="font-size:11px;">(${h.profit >= 0 ? '+' : ''}${h.profitPct.toFixed(1)}%)</span>
                    </td>
                </tr>
            `;
        });

        // 5. ランキングの生成（表示されている銘柄群ベースに追従）
        renderRankings(displayedHoldings);
    }

    function renderDonut(labels, data, colors) {
        const ctx = document.getElementById('allocationChart').getContext('2d');
        if (allocChart) allocChart.destroy();

        const isAllZero = data.every(v => v === 0);

        allocChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: isAllZero ? [1] : data,
                    backgroundColor: isAllZero ? ['#e2e8f0'] : colors,
                    borderWidth: 2,
                    hoverOffset: isAllZero ? 0 : 3
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false, cutout: '78%',
                plugins: { legend: { display: false } }
            }
        });
    }

    function renderRankings(items) {
        const ranked = [...items].filter(h => h.profit !== 0);
        const best = [...ranked].sort((a,b) => b.profitPct - a.profitPct).slice(0, 3);
        const worst = [...ranked].sort((a,b) => a.profitPct - b.profitPct).slice(0, 3);

        const bestEl = document.getElementById('ranking-best');
        const worstEl = document.getElementById('ranking-worst');
        bestEl.innerHTML = ''; worstEl.innerHTML = '';

        best.forEach((h, i) => {
            bestEl.innerHTML += `<div class="ranking-item"><span>${i+1}. ${h.name}</span><strong style="color:var(--trend-plus)">+${h.profitPct.toFixed(1)}%</strong></div>`;
        });
        worst.forEach((h, i) => {
            worstEl.innerHTML += `<div class="ranking-item"><span>${i+1}. ${h.name}</span><strong style="color:var(--trend-minus)">${h.profitPct.toFixed(1)}%</strong></div>`;
        });

        if(best.length === 0) bestEl.innerHTML = '<div style="color:var(--text-sub); font-size:12px;">データなし</div>';
        if(worst.length === 0) worstEl.innerHTML = '<div style="color:var(--text-sub); font-size:12px;">データなし</div>';
    }
</script>
</body>
</html>
